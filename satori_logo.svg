<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&amp;display=swap');
    </style>

    <radialGradient id="bgGlow" cx="50%" cy="44%" r="42%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0C1E35" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="bgGlow2" cx="50%" cy="44%" r="70%">
      <stop offset="0%" stop-color="#1D4ED8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0C1E35" stop-opacity="0"/>
    </radialGradient>

    <filter id="kanjiGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.37
                0 0 0 0 0.51
                0 0 0 0 0.98
                0 0 0 0.7 0" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Pozadie -->
  <rect width="600" height="600" fill="#0C1E35"/>
  <rect width="600" height="600" fill="url(#bgGlow2)"/>
  <rect width="600" height="600" fill="url(#bgGlow)"/>

  <!-- Dekoratívne kruhy -->
  <circle cx="300" cy="262" r="195" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
  <circle cx="300" cy="262" r="215" fill="none" stroke="rgba(59,130,246,0.07)" stroke-width="1"/>
  <circle cx="300" cy="262" r="240" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>

  <!-- Kanji 悟り — glow vrstva -->
  <text x="300" y="330"
    text-anchor="middle"
    font-size="168"
    fill="rgba(255,255,255,0.15)"
    font-family="serif"
    filter="url(#kanjiGlow)">悟り</text>

  <!-- Kanji 悟り — hlavný text -->
  <text x="300" y="330"
    text-anchor="middle"
    font-size="168"
    fill="rgba(255,255,255,0.92)"
    font-family="serif">悟り</text>

  <!-- Deliaca linka -->
  <line x1="264" y1="358" x2="336" y2="358" stroke="rgba(255,255,255,0.24)" stroke-width="0.8"/>

  <!-- SATORI -->
  <text x="300" y="412"
    text-anchor="middle"
    font-size="36"
    fill="white"
    font-family="'Cinzel', 'Palatino Linotype', Palatino, serif"
    font-weight="400"
    letter-spacing="18">SATORI</text>

  <!-- Motto -->
  <text x="300" y="462"
    text-anchor="middle"
    font-size="12"
    fill="rgba(255,255,255,0.52)"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    letter-spacing="0.5">Ten, kto vidí jasne, necháva náhodu iným.</text>

</svg>
