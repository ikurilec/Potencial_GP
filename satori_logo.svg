<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400&amp;display=swap');</style>

    <radialGradient id="bg" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0C1E35" stop-opacity="0"/>
    </radialGradient>

    <!-- Metalický gradient pre SATORI (zhora dole) -->
    <linearGradient id="satoriGrad" x1="0" y1="398" x2="0" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#FFFFFF"/>
      <stop offset="45%"  stop-color="#DCE8F2"/>
      <stop offset="100%" stop-color="#8AAABF"/>
    </linearGradient>

    <!-- Tieň pod SATORI -->
    <filter id="satoriShadow" x="-10%" y="-20%" width="120%" height="200%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000C1E" flood-opacity="0.75"/>
    </filter>

    <filter id="eGlow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.55 0 0 0 0 0.72 0 0 0 0 1 0 0 0 0.28 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="kGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.24 0 0 0 0 0.51 0 0 0 0 0.96 0 0 0 0.45 0" result="c"/>
      <feMerge><feMergeNode in="c"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="#0C1E35"/>
  <rect width="600" height="600" fill="url(#bg)"/>

  <!--
    Enso — menší, polomer 98
    Stred: (300, 244), polomer: 98
    Medzera 22° hore (259°–281°)
    Začiatok 281°: x=300+98·0.191=318.7, y=244+98·(−0.982)=244−96.2=147.8
    Koniec   259°: x=300+98·(−0.191)=281.3, y=244+98·(−0.982)=147.8
  -->
  <path d="M 318.7 147.8 A 98 98 0 1 1 281.3 147.8"
    fill="none"
    stroke="rgba(255,255,255,0.80)"
    stroke-width="10"
    stroke-linecap="butt"
    filter="url(#eGlow)"/>

  <!-- Kanji — glow -->
  <text x="300" y="249"
    text-anchor="middle"
    dominant-baseline="middle"
    font-size="78"
    fill="rgba(255,255,255,0.15)"
    font-family="serif"
    filter="url(#kGlow)">悟り</text>

  <!-- Kanji — hlavný -->
  <text x="300" y="249"
    text-anchor="middle"
    dominant-baseline="middle"
    font-size="78"
    fill="rgba(255,255,255,0.91)"
    font-family="serif">悟り</text>

  <!-- Linka — s medzerou od kruhu (kruh končí na y=342, linka na y=378) -->
  <line x1="150" y1="378" x2="450" y2="378"
    stroke="rgba(255,255,255,0.22)"
    stroke-width="1.2"/>

  <!-- SATORI — tieň vrstva -->
  <text x="302" y="421"
    text-anchor="middle"
    font-size="32"
    fill="rgba(0,12,30,0.6)"
    font-family="'Cinzel', 'Palatino Linotype', Palatino, serif"
    font-weight="400"
    letter-spacing="15">SATORI</text>

  <!-- SATORI — metalický gradient -->
  <text x="300" y="418"
    text-anchor="middle"
    font-size="32"
    fill="url(#satoriGrad)"
    font-family="'Cinzel', 'Palatino Linotype', Palatino, serif"
    font-weight="400"
    letter-spacing="15"
    filter="url(#satoriShadow)">SATORI</text>

  <!-- Motto -->
  <text x="300" y="458"
    text-anchor="middle"
    font-size="11"
    fill="rgba(255,255,255,0.42)"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-style="italic"
    letter-spacing="0.4">Ten, kto vidí jasne, necháva náhodu iným.</text>

</svg>
